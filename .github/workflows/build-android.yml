name: Compilar APK Android

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Instalar Android SDK 36
        uses: android-actions/setup-android@v3

      - name: Aceptar licencias y plataforma
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Compilar APK de prueba
        run: gradle --no-daemon :app:assembleDebug

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: AsistenteCampanas-Android-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
